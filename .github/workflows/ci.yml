name: Demo CI Pipeline

# Default working directory so CI runs inside my-app/
defaults:
  run:
    working-directory: my-app

# Workflow-level environment variables
env:
  GLOBAL_ENV: "I am a global environment variable"

on:
  push:
    branches: [ main ]

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Step 1 — Show environment variables
    - name: Show environment variables
      run: |
        echo "GLOBAL_ENV = $GLOBAL_ENV"
        echo "LOCAL_ENV = $LOCAL_ENV"
      env:
        LOCAL_ENV: "I am a step-level env var"

    # Step 2 — Use a secret
    - name: Show secret (masked)
      run: echo "Secret value is: ${{ secrets.DEMO_SECRET }}"

    # Step 3 — Dummy build step with output
    - id: build-step
      name: Dummy build
      run: |
        echo "Running dummy build..."
        #echo "::set-output name=buildMessage::Build completed successfully"
        echo "buildMessage=Build completed successfully" >> $GITHUB_OUTPUT
    # Step 4 — Dummy test step
    - name: Dummy tests
      run: npm test

    # Step 5 — Conditional execution
    - name: Run only if build output contains 'successfully'
      if: contains(steps.build-step.outputs.buildMessage, 'successfully')
      run: echo "Conditional step executed because build succeeded!"

    # Step 6 — Use output from build step
    - name: Show build output
      run: echo "Build step said: ${{ steps.build-step.outputs.buildMessage }}"

